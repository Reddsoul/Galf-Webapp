<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Galf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#F2F2F7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:20px;padding:48px 32px;width:90%;max-width:360px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.logo{font-size:56px;margin-bottom:8px}
h1{font-size:28px;font-weight:700;color:#1C1C1E;margin-bottom:4px}
.sub{font-size:15px;color:#8E8E93;margin-bottom:32px}
input[type=password]{width:100%;padding:16px;font-size:17px;border:1px solid #D1D1D6;border-radius:12px;outline:none;text-align:center;letter-spacing:4px;background:#F9F9F9;transition:border .2s}
input[type=password]:focus{border-color:#007AFF;background:#fff}
button{width:100%;padding:16px;font-size:17px;font-weight:600;background:#007AFF;color:#fff;border:none;border-radius:12px;margin-top:16px;cursor:pointer;transition:background .2s}
button:active{background:#005EC4}
.error{color:#FF3B30;font-size:14px;margin-top:12px}
</style>
</head>
<body>
<form class="login-card" method="POST">
  <div class="logo">⛳</div>
  <h1>Galf</h1>
  <p class="sub">Enter password to continue</p>
  <input type="password" name="password" placeholder="••••" autofocus autocomplete="off">
  <button type="submit">Sign In</button>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
</form>
</body>
</html>
